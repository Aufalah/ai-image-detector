<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI vs Real Image Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="script.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-2xl text-center">
        <h1 class="text-3xl font-bold mb-2">AI vs Real Image Detector</h1>
        <p class="text-gray-400 mb-6">Upload gambar untuk cek apakah buatan AI atau manusia</p>

        <label for="imageInput" class="cursor-pointer block w-full border-2 border-dashed border-gray-600 rounded-xl p-10 hover:border-blue-500 transition">
            <span id="labelText">Klik atau drop gambar di sini</span>
            <input type="file" id="imageInput" accept="image/*" class="hidden">
        </label>

        <img id="preview" class="hidden mx-auto mt-6 rounded-lg max-h-80" />

        <div id="result" class="mt-6 text-left hidden">
            <h2 class="text-xl font-semibold mb-3">Hasil Analisis:</h2>
            <div id="verdict" class="text-2xl font-bold mb-4"></div>
            <div id="details" class="bg-gray-700 p-4 rounded-lg text-sm space-y-2"></div>
        </div>

        <p class="text-xs text-gray-500 mt-8">Disclaimer: Hasil ini probabilitas, bukan kepastian 100%. Detektor berbasis metadata & pola umum.</p>
    </div>
</body>
</html>
